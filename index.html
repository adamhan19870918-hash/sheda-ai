<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHEDA AI | 실전 데이터 정밀 진단</title>
    <style>
        :root { --navy: #1a2a3a; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
        h2 { color: var(--navy); text-align: center; font-size: 26px; margin-bottom: 30px; }
        textarea { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #eee; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; resize: none; }
        button { width: 100%; padding: 20px; background: var(--navy); color: #fff; border: none; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; transform: translateY(-2px); }
        #res { margin-top: 40px; text-align: left; background: #fffaf0; padding: 30px; border-radius: 20px; display: none; white-space: pre-wrap; line-height: 1.8; border-left: 8px solid var(--gold); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏝️ SHEDA 데이터 기반 정밀 진단</h2>
        <textarea id="q" rows="4" placeholder="분석할 질문을 입력하세요 (예: 2월 도쿄 숙소 위치 추천)"></textarea>
        <button onclick="run()">✅ 실전 데이터 매칭 시작</button>
        <div id="res"></div>
    </div>

    <script>
        // 과장님의 'My First Project' 소속 진짜 API 키입니다.
        const API_KEY = "AIzaSyCscsSLLPENUKP-I5XJNkr4oR5qP5ATFnc"; 

        async function run() {
            const q = document.getElementById('q').value;
            const resDiv = document.getElementById('res');
            if(!q) return alert("내용을 입력해주세요.");

            resDiv.style.display = "block";
            resDiv.innerText = "📡 일본 현지 인프라 데이터 분석 중...";

            try {
                // v1beta 모델 경로와 API 키를 공백 없이 정확히 연결합니다.
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: q + " 에 대해 15년 경력 일본 여행 전문가로서 상세히 분석해줘." }] }]
                    })
                });

                const data = await response.json();
                
                // 구글 서버 에러 메시지를 구체적으로 확인합니다.
                if (data.error) {
                    throw new Error(`${data.error.message} (코드: ${data.error.code})`);
                }

                if (data.candidates && data.candidates[0].content) {
                    resDiv.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("데이터를 가져오는 데 실패했습니다.");
                }
            } catch (e) {
                resDiv.innerHTML = `<b>연결 실패:</b> ${e.message}<br><br>💡 <b>해결책:</b> 1분 뒤에 Ctrl+F5를 눌러주세요. 만약 계속 안 된다면 구글 콘솔에서 키 제한 설정을 다시 확인해야 합니다.`;
            }
        }
    </script>
</body>
</html>
