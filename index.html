<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHEDA AI | 실전 데이터 정밀 진단</title>
    <style>
        :root { --navy: #1a2a3a; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); padding: 40px; text-align: center; color: #333; }
        .box { max-width: 650px; margin: 0 auto; background: #fff; padding: 45px; border-radius: 35px; box-shadow: 0 20px 60px rgba(0,0,0,0.06); }
        h2 { color: var(--navy); font-size: 26px; font-weight: 900; margin-bottom: 30px; }
        textarea { width: 100%; padding: 25px; border-radius: 20px; border: 2.5px solid #eee; font-size: 17px; outline: none; box-sizing: border-box; resize: none; margin-bottom: 25px; }
        button { width: 100%; padding: 22px; background: var(--navy); color: #fff; border: none; border-radius: 18px; font-size: 20px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; transform: translateY(-3px); }
        #res { margin-top: 50px; text-align: left; background: #fffaf0; padding: 35px; border-radius: 25px; display: none; white-space: pre-wrap; line-height: 2.2; border-left: 10px solid var(--gold); }
    </style>
</head>
<body>

<div class="box">
    <h2>🗾 SHEDA 데이터 기반 정밀 진단</h2>
    <textarea id="q" rows="3" placeholder="예: 2월 도쿄 숙소 위치 추천해줘."></textarea>
    <button onclick="ask()">✅ 실전 데이터 매칭 시작</button>
    <div id="res"></div>
</div>

<script>
    // 과장님이 'My First Project'에서 성공하신 바로 그 키입니다!
    const API_KEY = "AIzaSyAxVeXpJ0tNVmKq88O-QvkGezD4tkJ2EcM"; 
    
    async function ask() {
        const q = document.getElementById('q').value;
        const resDiv = document.getElementById('res');
        if(!q) return alert("분석할 데이터를 입력해주세요!");

        resDiv.style.display = "block";
        resDiv.innerText = "📡 일본 현지 인프라 데이터 분석 중...";

        try {
            // Playground에서 성공한 'gemini-1.5-flash' 모델을 v1beta 경로로 호출합니다.
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: q + " 에 대해 15년 경력 일본 여행 전문가처럼 상세히 분석해줘." }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            resDiv.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            resDiv.innerHTML = `<b>연결 실패:</b> ${e.message}<br><br>💡 <b>과장님 필독:</b> 깃허브 배포 후 반영까지 1~2분 정도 걸릴 수 있습니다. 잠시 후 새로고침(F5)하고 다시 해보세요!`;
        }
    }
</script>

</body>
</html>
