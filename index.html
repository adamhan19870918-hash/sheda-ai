<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHEDA AI | 실전 데이터 정밀 진단</title>
    <script src="https://unpkg.com/@google/generative-ai"></script>
</head>
<body style="font-family: sans-serif; padding: 50px; text-align: center; background: #f4f7f9;">
    <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
        <h3>🏝️ SHEDA 데이터 기반 정밀 진단</h3>
        <textarea id="input" style="width: 100%; height: 100px; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px;" placeholder="질문을 입력하세요."></textarea>
        <button id="btn" style="width: 100%; padding: 15px; background: #1a2a3a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">✅ 분석 시작</button>
        <div id="output" style="margin-top: 30px; text-align: left; white-space: pre-wrap; display: none; padding: 20px; background: #fffaf0; border-radius: 15px;"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyCscsSLLPENUKP-I5XJNkr4oR5qP5ATFnc"; // 과장님의 진짜 키
        const sysPrompt = "너는 15년 경력의 일본 여행 전문가 SHEDA AI야. 전문가적 시각으로 분석해줘.";

        document.getElementById('btn').onclick = async () => {
            const prompt = document.getElementById('input').value;
            const out = document.getElementById('output');
            out.style.display = "block";
            out.innerText = "📡 분석 중...";

            try {
                // 외부 라이브러리를 직접 호출하여 API 키 문제를 정면 돌파합니다.
                const genAI = new window.GoogleGenerativeAI.GoogleGenerativeAI(API_KEY);
                const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                const result = await model.generateContent(sysPrompt + "\n\n질문: " + prompt);
                out.innerText = result.response.text();
            } catch (e) {
                out.innerText = "연결 오류: " + e.message + "\n\n💡 팁: 구글 콘솔에서 '키 제한 안함' 설정 후 5분이 지나야 합니다.";
            }
        };
    </script>
</body>
</html>
