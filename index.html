<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHEDA AI | 실전 데이터 진단</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f9; text-align: center; }
        .box { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 20px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 20px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 20px; background: #1a2a3a; color: #fff; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 18px; }
        #res { margin-top: 30px; text-align: left; background: #fffaf0; padding: 25px; border-radius: 15px; display: none; white-space: pre-wrap; line-height: 1.8; border-left: 8px solid #c5a059; }
    </style>
</head>
<body>
    <div class="box">
        <h3>🗾 SHEDA 데이터 기반 정밀 진단</h3>
        <textarea id="q" rows="3" placeholder="예: 2월 도쿄 숙소 위치 추천해줘."></textarea>
        <button onclick="ask()">실전 데이터 매칭 시작</button>
        <div id="res"></div>
    </div>
<script>
    const API_KEY = "AIzaSyAxVeXpJ0tNVmKq88O-QvkGezD4tkJ2EcM"; 
    async function ask() {
        const q = document.getElementById('q').value;
        const resDiv = document.getElementById('res');
        if(!q) return alert("내용을 입력해주세요!");
        resDiv.style.display = "block";
        resDiv.innerText = "📡 일본 현지 데이터 매칭 중...";
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: q + " 에 대해 전문가처럼 상세히 분석해줘." }] }] })
            });
            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            resDiv.innerText = data.candidates[0].content.parts[0].text;
        } catch (e) {
            resDiv.innerHTML = `<b>연결 실패:</b> ${e.message}<br><br>💡 잠시 후 새로고침(F5)하고 다시 해보세요!`;
        }
    }
</script>
</body>
</html>
