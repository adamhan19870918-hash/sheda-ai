<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SHEDA AI | 실전 데이터 진단</title>
    <style>
        :root { --navy: #1a2a3a; --gold: #c5a059; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); padding: 30px; text-align: center; color: #333; }
        .container { max-width: 650px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.08); }
        h2 { color: var(--navy); font-size: 24px; font-weight: 900; margin-bottom: 25px; }
        textarea { width: 100%; padding: 20px; border-radius: 15px; border: 2px solid #eee; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 20px; background: var(--navy); color: #fff; border: none; border-radius: 15px; font-size: 19px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; transform: translateY(-2px); }
        #res { margin-top: 40px; text-align: left; background: #fffaf0; padding: 30px; border-radius: 20px; display: none; white-space: pre-wrap; line-height: 2; border-left: 10px solid var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h2>🏝️ SHEDA 데이터 기반 정밀 진단</h2>
    <textarea id="q" rows="3" placeholder="예: 2월 도쿄 벚꽃 시즌 숙소 위치 추천해줘."></textarea>
    <button onclick="runShedaAI()">✅ 실전 데이터 매칭 시작</button>
    <div id="res"></div>
</div>

<script>
    // 과장님이 방금 발급받으신 'My First Project'의 진짜 API 키입니다!
    const API_KEY = "AIzaSyCscsSLLPENUKP-I5XJNkr4oR5qP5ATFnc"; 

    async function runShedaAI() {
        const q = document.getElementById('q').value;
        const resDiv = document.getElementById('res');
        if(!q) return alert("분석할 질문을 입력하세요!");

        resDiv.style.display = "block";
        resDiv.innerText = "📡 일본 현지 인프라 데이터 분석 중...";

        try {
            // Playground에서 성공한 v1beta 경로와 모델명을 정확히 매칭했습니다.
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: q + " 에 대해 15년 경력 일본 여행 전문가처럼 팩트 위주로 상세히 분석해서 리포트를 써줘." }] }]
                })
            });

            const data = await response.json();
            
            if (data.error) throw new Error(data.error.message);

            if (data.candidates && data.candidates[0].content) {
                resDiv.innerText = data.candidates[0].content.parts[0].text;
            } else {
                throw new Error("데이터를 가져오지 못했습니다. 잠시 후 다시 시도해 주세요.");
            }
        } catch (e) {
            resDiv.innerHTML = `<b>연결 실패:</b> ${e.message}<br><br>💡 <b>팁:</b> 깃허브 저장 후 반영까지 1분 정도 걸립니다. 잠시 후 Ctrl+F5를 눌러주세요!`;
        }
    }
</script>

</body>
</html>
